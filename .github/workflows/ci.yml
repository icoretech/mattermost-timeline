name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test -race ./...

  webapp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx biome check .
      - run: npx vitest run
      - run: npx vite build

  build:
    runs-on: ubuntu-latest
    needs: [server, webapp]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - run: cd webapp && npm ci
      - run: make dist
      - uses: actions/upload-artifact@v4
        with:
          name: plugin-bundle
          path: dist/*.tar.gz

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test -race ./...

  webapp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.0
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - run: make apply
      - run: cd webapp && npm ci
      - run: cd webapp && npx tsc --noEmit
      - run: cd webapp && npx biome check .
      - run: cd webapp && npx vitest run
      - run: cd webapp && npx vite build

  build:
    runs-on: ubuntu-latest
    needs: [server, webapp]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.0
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - run: cd webapp && npm ci
      - run: make dist
      - uses: actions/upload-artifact@v7
        with:
          name: plugin-bundle
          path: dist/*.tar.gz
